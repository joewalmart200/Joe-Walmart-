<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #black;
            color: #000;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .profile-card {
            background: white;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            max-width: 400px;
            width: 50%;
        }
        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #black;
            margin-bottom: 20px;
        }
        h1 {
            margin: 10px 0 5px 0;
            font-size: 24px;
            color: #222;
        }
        .tagline {
            color: #666;
            font-style: italic;
            margin-bottom: 20px;
        }
        .bio {
            line-height: 1.6;
            color: #444;
            font-size: 16px;
        }
        .interests {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .interests span {
            display: inline-block;
            background: #e9ecef;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 14px;
            margin: 5px;
            color: #495057;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <img src="profile.jpg" alt="me" class="profile-pic">
        
        <h1>Joe walmart</h1>
       
        
        <p class="bio">
            wsg im joe walmart 
        </p>
 
    </div>

</body>
</html>
